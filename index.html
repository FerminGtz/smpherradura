<script>

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTAwKmk13IuKDEfk3JJ8wSBp6hU0JTvwdiPcSGfMjL2-DdS1N6Viis9IE01bkgEkkhvPIs47bph8lNB/pub?gid=991654690&single=true&output=csv";

const playersSheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTAwKmk13IuKDEfk3JJ8wSBp6hU0JTvwdiPcSGfMjL2-DdS1N6Viis9IE01bkgEkkhvPIs47bph8lNB/pub?gid=762416889&single=true&output=csv";


/* =========================
LEADERBOARD
========================= */

fetch(sheetURL)
.then(res=>res.text())
.then(data=>{

const rows=data.trim().split("\n");
const headers=rows[0].split(",");

const idxWinner=headers.indexOf("NombreRes");
const idxLoser=headers.indexOf("Perdedor");
const idxWinDiff=headers.indexOf("Diferencia");
const idxLoseDiff=headers.indexOf("Dif Perdedor");
const idxGrupo=headers.indexOf("GrupoRes");

if(idxWinner<0 || idxLoser<0 || idxGrupo<0) return;

let players={};

rows.slice(1).forEach(row=>{

const cols=row.split(",");

const winner=cols[idxWinner];
const loser=cols[idxLoser];

const winDiff=Number(cols[idxWinDiff]||0);
const loseDiff=Number(cols[idxLoseDiff]||0);

if(winner){

if(!players[winner]) players[winner]={jugador:winner,grupo:"",jugados:0,ganados:0,diff:0};

players[winner].jugados++;
players[winner].ganados++;
players[winner].diff+=winDiff;

}

if(loser){

if(!players[loser]) players[loser]={jugador:loser,grupo:"",jugados:0,ganados:0,diff:0};

players[loser].jugados++;
players[loser].diff-=loseDiff;

}

});


rows.slice(1).forEach(row=>{

const cols=row.split(",");

const winner=cols[idxWinner];
const loser=cols[idxLoser];
const grupo=cols[idxGrupo];

if(winner && players[winner]) players[winner].grupo=grupo;
if(loser && players[loser] && !players[loser].grupo) players[loser].grupo=grupo;

});


let groups={};

Object.values(players).forEach(p=>{

if(!groups[p.grupo]) groups[p.grupo]=[];

groups[p.grupo].push(p);

});


const container=document.getElementById("groupsContainer");

container.innerHTML="";

Object.keys(groups).sort().forEach(g=>{

const jugadores=groups[g].sort((a,b)=>{

if(b.ganados!==a.ganados) return b.ganados-a.ganados;

return b.diff-a.diff;

});

let html=`<div class="groupTitle">Grupo ${g}</div>`;

html+="<table><tr><th>Pos</th><th>Jugador</th><th>JJ</th><th>JG</th><th>Dif</th></tr>";

jugadores.forEach((p,i)=>{

const posClass=(i===0)?'firstPlace':(i===1?'secondPlace':'');

html+=`<tr class="${posClass}">
<td>${i+1}</td>
<td>${p.jugador}</td>
<td>${p.jugados}</td>
<td>${p.ganados}</td>
<td>${p.diff}</td>
</tr>`;

});

html+="</table>";

container.innerHTML+=html;

});

})


.catch(err=>console.log("Leaderboard error",err));


/* =========================
RESULTADOS
========================= */

fetch(sheetURL)
.then(res=>res.text())
.then(data=>{

const rows=data.trim().split("\n");

if(rows.length<2) return;

const headers=rows[0].split(",");

const idxFecha=headers.indexOf("Fecha");
const idxGrupo=headers.indexOf("GrupoRes");
const idxWinner=headers.indexOf("NombreRes");
const idxLoser=headers.indexOf("Perdedor");
const idxDiff=headers.indexOf("Diferencia");

let results=[];

rows.slice(1).forEach(row=>{

const cols=row.split(",");

results.push({

fecha: idxFecha>=0 ? cols[idxFecha] : "",
grupo: idxGrupo>=0 ? cols[idxGrupo] : "",
ganador: idxWinner>=0 ? cols[idxWinner] : "",
perdedor: idxLoser>=0 ? cols[idxLoser] : "",
diff: idxDiff>=0 ? cols[idxDiff] : ""

});

});

results.sort((a,b)=> new Date(b.fecha)-new Date(a.fecha));

const container=document.getElementById("resultsContainer");

let html=`
<table>
<tr>
<th>Fecha</th>
<th>Grupo</th>
<th>Ganador</th>
<th>Perdedor</th>
<th>Diferencia</th>
</tr>
`;

results.forEach(r=>{

html+=`
<tr>
<td>${r.fecha}</td>
<td>${r.grupo}</td>
<td>${r.ganador}</td>
<td>${r.perdedor}</td>
<td>${r.diff}</td>
</tr>
`;

});

html+="</table>";

container.innerHTML=html;

})
.catch(err=>console.log("Resultados error",err));


/* =========================
JUGADORES
========================= */

fetch(playersSheetURL)
.then(res=>res.text())
.then(data=>{

const rows=data.trim().split("\n");
const headers=rows[0].split(",");

const idxNombre=headers.findIndex(h=>h.toLowerCase().includes("nombre")||h.toLowerCase().includes("jugador"));
const idxGrupo=headers.findIndex(h=>h.toLowerCase().includes("grupo"));
const idxGHIN=headers.findIndex(h=>h.toLowerCase().includes("ghin"));
const idxEmail=headers.findIndex(h=>h.toLowerCase().includes("email")||h.toLowerCase().includes("correo"));
const idxTel=headers.findIndex(h=>h.toLowerCase().includes("tel"));

let players=[];

rows.slice(1).forEach(row=>{

const cols=row.split(",");

players.push({
grupo:cols[idxGrupo]||"",
nombre:cols[idxNombre]||"",
ghin:cols[idxGHIN]||"",
email:cols[idxEmail]||"",
telefono:cols[idxTel]||""
});

});

players.sort((a,b)=>{

if(a.grupo!==b.grupo) return a.grupo.localeCompare(b.grupo);

return a.nombre.localeCompare(b.nombre);

});

const playersContainer=document.getElementById("playersContainer");

let html=`
<table>
<tr>
<th>Grupo</th>
<th>Jugador</th>
<th>GHIN</th>
<th>Email</th>
<th>Teléfono</th>
</tr>
`;

let grupoAnterior="";

players.forEach(p=>{

if(grupoAnterior!=="" && p.grupo!==grupoAnterior){

html+=`<tr><td colspan="5" style="height:15px"></td></tr>`;

}

html+=`
<tr>
<td>${p.grupo}</td>
<td>${p.nombre}</td>
<td>${p.ghin}</td>
<td>${p.email}</td>
<td>${p.telefono}</td>
</tr>
`;

grupoAnterior=p.grupo;

});

html+="</table>";

playersContainer.innerHTML=html;

})
.catch(err=>console.log("Jugadores error",err));


/* =========================
NAVEGACIÓN
========================= */

function showTab(tabId){

const tabs=document.querySelectorAll('.tab');

tabs.forEach(t=>t.style.display='none');

document.getElementById(tabId).style.display='block';

}

</script>
