<script>

// -------- URL DEL GOOGLE SHEET (CSV) --------
const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTAwKmk13IuKDEfk3JJ8wSBp6hU0JTvwdiPcSGfMjL2-DdS1N6Viis9IE01bkgEkkhvPIs47bph8lNB/pub?gid=991654690&single=true&output=csv";

// -------- FUNCION PARA PARSEAR CSV SEGURO --------
function parseCSV(text) {
  const rows = [];
  const lines = text.split("\n");

  lines.forEach(line => {
    const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
    rows.push(cols.map(c => c.replace(/^"|"$/g, "").trim()));
  });

  return rows;
}

// -------- LEER GOOGLE SHEET --------
fetch(sheetURL)
.then(res => res.text())
.then(csv => {

  const data = parseCSV(csv);
  const headers = data[0];

  const idxWinner = headers.indexOf("NombreRes");
  const idxLoser = headers.indexOf("Perdedor");
  const idxWinDiff = headers.indexOf("Diferencia");
  const idxLoseDiff = headers.indexOf("Dif Perdedor");
  const idxGrupo = headers.indexOf("GrupoRes");

  const players = {};

  // -------- CALCULAR ESTADISTICAS --------
  data.slice(1).forEach(row => {

    const winner = row[idxWinner];
    const loser = row[idxLoser];
    const winDiff = Number(row[idxWinDiff] || 0);
    const loseDiff = Number(row[idxLoseDiff] || 0);
    const grupo = row[idxGrupo];

    if (winner) {
      if (!players[winner])
        players[winner] = { jugador:winner, grupo:grupo, jj:0, jg:0, diff:0 };

      players[winner].jj++;
      players[winner].jg++;
      players[winner].diff += winDiff;
    }

    if (loser) {
      if (!players[loser])
        players[loser] = { jugador:loser, grupo:grupo, jj:0, jg:0, diff:0 };

      players[loser].jj++;
      players[loser].diff -= loseDiff;
    }

  });

  // -------- AGRUPAR --------
  const groups = {};

  Object.values(players).forEach(p=>{
    if(!groups[p.grupo]) groups[p.grupo] = [];
    groups[p.grupo].push(p);
  });

  // -------- CONSTRUIR LEADERBOARD --------
  const container = document.getElementById("groupsContainer");
  container.innerHTML = "";

  Object.keys(groups).sort().forEach(g=>{

    const jugadores = groups[g].sort((a,b)=>{
      if(b.jg !== a.jg) return b.jg - a.jg;
      return b.diff - a.diff;
    });

    let html = `<div class="groupTitle">Grupo ${g}</div>`;
    html += `<table>
    <tr>
      <th>Pos</th>
      <th>Jugador</th>
      <th>JJ</th>
      <th>JG</th>
      <th>Dif</th>
    </tr>`;

    jugadores.forEach((p,i)=>{
      const cls = i===0 ? "firstPlace" : (i===1 ? "secondPlace" : "");
      html += `<tr class="${cls}">
        <td>${i+1}</td>
        <td>${p.jugador}</td>
        <td>${p.jj}</td>
        <td>${p.jg}</td>
        <td>${p.diff}</td>
      </tr>`;
    });

    html += "</table>";

    container.innerHTML += html;

  });

})
.catch(err=>{
  console.error("Error cargando Google Sheet:", err);
});


// -------- TABS --------
function showTab(tabId){
  const tabs=document.querySelectorAll('.tab');
  tabs.forEach(t=>t.style.display='none');
  document.getElementById(tabId).style.display='block';
}

</script>
